[build]
  publish = "."

# No build command needed — static files served as-is

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Clean URLs — serve .html files without extension
[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/philosophy"
  to = "/philosophy.html"
  status = 200

[[redirects]]
  from = "/work"
  to = "/cv.html"
  status = 200

[[redirects]]
  from = "/affiliate"
  to = "/affiliate.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200
