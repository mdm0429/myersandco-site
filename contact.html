<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myers & Co | Contact</title>
  <meta name="description" content="Ready to build a growth engine that compounds? Let's talk.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="contact-hero">
    <nav class="nav">
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <a href="index.html">home</a>
      <a href="services.html">services</a>
      <a href="cv.html">work</a>
      <a href="affiliate.html">affiliate</a>
      <a href="philosophy.html">philosophy</a>
      <a href="contact.html" class="active">contact</a>
    </nav>
    <div class="page-container">
      <h1 class="page-heading">work with us</h1>
      <p class="contact-intro">ready to move from static reports to living data? from brand spend to compounding growth infrastructure? let's figure out if we're the right fit — together.</p>
    </div>
  </div>
  <div class="contact-card">
    <div class="contact-card-inner">
      <h2>let's chat</h2>
      <div class="contact-info">
        <div class="contact-info-item">
          <span class="contact-info-label">phone</span>
          <span class="contact-info-value"><a href="tel:2016147418">201 614 7418</a></span>
        </div>
        <div class="contact-info-item">
          <span class="contact-info-label">email</span>
          <span class="contact-info-value"><a href="mailto:matt@myersandcompany.co">matt@myersandcompany.co</a></span>
        </div>
        <div class="contact-info-item">
          <span class="contact-info-label">social</span>
          <span class="contact-info-value"><a href="http://linkedin.com/in/mmyers0429" target="_blank" rel="noopener">linkedin</a></span>
        </div>
      </div>
      <form class="contact-form" id="contactForm">
        <div class="form-group">
          <label for="firstName">first</label>
          <input type="text" id="firstName" name="firstName">
        </div>
        <div class="form-group">
          <label for="lastName">last</label>
          <input type="text" id="lastName" name="lastName">
        </div>
        <div class="form-group">
          <label for="email">email *</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group full-width">
          <label for="message">message</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <div class="form-submit">
          <button type="submit" class="btn-submit">submit</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
